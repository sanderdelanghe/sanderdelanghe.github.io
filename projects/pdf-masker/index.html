<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upload a PDF and reveal hidden words one click at a time." />
  <title>PDF Masker</title>

  <!-- PDF.js core viewer styles for text layer alignment -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ===== Toolbar ===== -->
  <nav id="toolbar">
    <div class="toolbar-brand">
      <div class="logo-box" title="PDF Masker">PDF</div>
    </div>

    <div id="page-info"></div>

    <div id="toolbar-controls">
      <div class="toolbar-toggles">
        <label class="toggle-label" title="Mask entire lines instead of individual words">
          <input type="checkbox" id="mode-line-toggle" checked />
          <span class="toggle-text">Line Mode</span>
        </label>

        <label class="toggle-label" title="Reveal text by hovering over it">
          <input type="checkbox" id="mode-hover-toggle" checked />
          <span class="toggle-text">Hover Reveal</span>
        </label>
      </div>

      <div class="toolbar-divider"></div>

      <button class="toolbar-btn" id="reveal-all-btn" title="Reveal all words">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <span>Reveal All</span>
      </button>

      <button class="toolbar-btn" id="hide-all-btn" title="Hide all words">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path
            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
        <span>Hide All</span>
      </button>

      <div class="toolbar-divider"></div>

      <button class="toolbar-btn accent" id="change-file-btn" title="Upload a different PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span>New File</span>
      </button>
    </div>
  </nav>

  <!-- ===== Main Content ===== -->
  <main>

    <!-- Upload Section -->
    <section id="upload-section">
      <div id="upload-zone" tabindex="0" role="button" aria-label="Upload PDF file">
        <h2>Drop PDF Here</h2>
        <p>Or click to browse</p>
      </div>
      <input type="file" id="file-input" accept=".pdf,application/pdf" hidden />
    </section>

    <!-- Loading Section -->
    <section id="loading-section" class="hidden">
      <div class="spinner"></div>
      <p class="loading-text">Processing your PDF…</p>
    </section>

    <!-- Viewer Section -->
    <section id="viewer-section" class="hidden">
      <div id="viewer"></div>
    </section>

  </main>

  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="js/app.js"></script>
</body>

</html>
